environment {
  name = TEST
  region = TEST
  location = TEST
  prodMode = false
  timeZone = "UTC"
}

install {
  directory = "/local/1/app/test"
  user = testuser
}

runtime {
  javaHome = "/usr/java/latest"
}

logging {
  level = info
}

trading {
  applicationIdentifier = TESTAPP
  function = TEST
  appDeskGroup = TEST

  shard {
    shard1 {
      primary.host = testhost1
      primary.directory = ${install.directory}"/shard_1"
      backup.host = testhost2
      backup.directory = ${install.directory}"/shard_1"
      symbolFilter = "A*"
      jmxPort = 9001

      channelFilter {
        trading = "Symbol="${trading.shard.shard1.symbolFilter}
        common = "Symbol="${trading.shard.shard1.symbolFilter}
        listMessage = _NO_FILTER_
        marketDataSnapshot = ${trading.shard.shard1.channelFilter.trading}
        deskGroup = "DeskGroup="${trading.appDeskGroup}
      }

      dr {
        host = testhost3
        directory = ${install.directory}"/shard_1"
      }
    }

    shard2 {
      primary.host = testhost2
      primary.directory = ${install.directory}"/shard_2"
      backup.host = testhost1
      backup.directory = ${install.directory}"/shard_2"
      symbolFilter = "B*|C*"
      jmxPort = 9002

      channelFilter {
        trading = "Symbol="${trading.shard.shard2.symbolFilter}
        common = "Symbol="${trading.shard.shard2.symbolFilter}
        listMessage = _FULL_FILTER_
        marketDataSnapshot = ${trading.shard.shard2.channelFilter.trading}
        deskGroup = "DeskGroup="${trading.appDeskGroup}
      }

      dr {
        host = testhost3
        directory = ${install.directory}"/shard_2"
      }
    }
  }
}
