ssh {
  user = "sysusetprd"
}

solace {
  host = "eqht-nyk-prd-sol"
  vpn = "eqht_nyk_prd"
}

blackbird {
  tlt = "app/trading/bin/tlt/tlt.sh"
  solace_ssl_lib = "app/trading/lib/solaceSSL"
  native_lib = "app/trading/lib/native"
  archive_date = "20260430.00.00.00.123"

  shards {
    shard11 {
      name = "shard11"
      host = "bb-host-a.example.com"
      root = "/appBaseDir/shard1/trading"
      trace_root = "/tmp/blackbird-trace/shard11"
      app_jar = "app/trading/lib/trading-345.2.1.jar"
      archive = "data/trading/archive/trading-shard11-20260430.00.00.00.123.tar.gz"
      inbound_log = "data/trading/archive/trading-shard11-20260430.00.00.00.123.in.log"
      log_file = "trading.data-timestamp.log"
      in_log = "trading.data-timestamp.in.log"
      debug_port = "5005"
    }

    shard12 {
      name = "shard12"
      host = "bb-host-a.example.com"
      root = "/appBaseDir/shard2/trading"
      app_jar = "app/trading/lib/trading-345.2.1.jar"
      archive = "data/trading/archive/trading-shard12-20260430.00.00.00.123.tar.gz"
      log_file = "trading.data-timestamp.log"
    }

    shard13 {
      name = "shard13"
      host = "bb-host-a.example.com"
      root = "/appBaseDir/shard3/trading"
      app_jar = "app/trading/lib/trading-345.2.1.jar"
      archive = "data/trading/archive/trading-shard13-20260430.00.00.00.123.tar.gz"
      log_file = "trading.data-timestamp.log"
    }

    shard21 {
      name = "shard21"
      host = "bb-host-b.example.com"
      root = "/appBaseDir/shard1/trading"
      app_jar = "app/trading/lib/trading-345.2.1.jar"
      archive = "data/trading/archive/trading-shard21-20260430.00.00.00.123.tar.gz"
      log_file = "trading.data-timestamp.log"
    }
  }
}

run {
  # Full-application replay workflows should usually target one shard.
  selected_shards = [
    ${blackbird.shards.shard11}
  ]
}
